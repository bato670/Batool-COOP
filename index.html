<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة التدريب التعاوني الذكية | وزارة الحج والعمرة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --purple-950:#1b0f2e;
  --purple-900:#2a1745;
  --purple-800:#3a2160;
  --purple-700:#4d2c80;
  --purple-600:#6438a8;
  --purple-500:#7f4fc9;
  --purple-400:#a37ede;
  --purple-300:#c7ade9;
  --purple-100:#f1eaf9;
  --gold-600:#a9822f;
  --gold-500:#c79c3f;
  --gold-400:#e0b559;
  --gold-200:#f0dcae;
  --cream-50:#fbfaf7;
  --cream-100:#f6f2ea;
  --cream-200:#eee6d6;
  --ink-900:#1c1a22;
  --ink-700:#3d3a48;
  --muted:#7c7688;
  --success:#2f8f6a;
  --warning:#c98a2c;
  --danger:#b8433f;
  --radius-lg:22px;
  --radius-md:14px;
  --radius-sm:8px;
  --shadow-soft:0 10px 30px -12px rgba(42,23,69,.18);
  --shadow-card:0 4px 18px -6px rgba(42,23,69,.12);
  --bg:var(--cream-50);
  --surface:#ffffff;
  --card:#ffffff;
  --border:#e6ddcf;
  --text:var(--ink-900);
  --text-muted:var(--muted);
  --sidebar-bg:linear-gradient(180deg,var(--purple-900),var(--purple-950));
  --header-bg:rgba(251,250,247,.82);
  --grad-primary:linear-gradient(135deg,var(--purple-700),var(--purple-500));
  --grad-gold:linear-gradient(135deg,var(--gold-600),var(--gold-400));
}
[data-theme="dark"]{
  --bg:#141020;
  --surface:#1c1730;
  --card:#211c38;
  --border:#332a52;
  --text:#f1eefb;
  --text-muted:#a99bc9;
  --header-bg:rgba(20,16,32,.82);
  --cream-50:#141020;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Tajawal',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background .4s ease,color .4s ease;
  overflow-x:hidden;
}
::selection{background:var(--purple-300);}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
img{max-width:100%;display:block;}

/* ===== Utility ===== */
.hidden{display:none!important;}
.flex{display:flex;}
.muted{color:var(--text-muted);}

/* ===== App Shell ===== */
.app{display:flex;min-height:100vh;}

/* ===== Sidebar ===== */
.sidebar{
  width:272px;
  background:var(--sidebar-bg);
  color:#efe6ff;
  position:sticky;
  top:0;height:100vh;
  display:flex;flex-direction:column;
  padding:22px 16px;
  transition:width .35s cubic-bezier(.4,0,.2,1);
  z-index:50;
  border-left:1px solid rgba(255,255,255,.06);
}
.sidebar.collapsed{width:84px;}
.sidebar.collapsed .side-label,.sidebar.collapsed .brand-text,.sidebar.collapsed .side-search{opacity:0;pointer-events:none;width:0;}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 22px;}
.brand-logos{display:flex;align-items:center;gap:6px;}
.brand-logos img{height:34px;width:auto;border-radius:6px;background:#fff;padding:3px;}
.logo-spin{animation:logoFloat 5s ease-in-out infinite;}
@keyframes logoFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-3px) scale(1.04);}}
.brand-text{font-weight:800;font-size:14px;line-height:1.3;white-space:nowrap;overflow:hidden;transition:opacity .25s,width .25s;}
.brand-text small{display:block;font-weight:400;font-size:11px;color:#c9b6f2;}

.side-search{
  background:rgba(255,255,255,.08);
  border-radius:12px;padding:9px 12px;display:flex;align-items:center;gap:8px;
  margin-bottom:14px;transition:opacity .2s;
}
.side-search input{background:none;border:none;color:#fff;font-size:13px;width:100%;outline:none;}
.side-search input::placeholder{color:#b9a6df;}

.nav-scroll{overflow-y:auto;flex:1;padding-left:2px;}
.nav-scroll::-webkit-scrollbar{width:5px;}
.nav-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:6px;}

.nav-group{margin-bottom:6px;}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;
  font-size:13.5px;color:#d9caf0;position:relative;transition:background .2s,color .2s;
  white-space:nowrap;
}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:linear-gradient(90deg,rgba(199,156,63,.22),rgba(199,156,63,.05));color:#fff;}
.nav-item.active::before{content:"";position:absolute;right:-16px;top:8px;bottom:8px;width:3px;background:var(--gold-400);border-radius:4px;}
.nav-item .ic{width:19px;text-align:center;flex-shrink:0;}
.side-label{transition:opacity .2s;}
.nav-badge{margin-right:auto;background:var(--danger);color:#fff;font-size:10px;border-radius:20px;padding:1px 7px;font-weight:700;}

.collapse-btn{
  margin-top:10px;align-self:flex-end;width:34px;height:34px;border-radius:10px;
  background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;
}

/* ===== Main ===== */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  position:sticky;top:0;z-index:40;
  backdrop-filter:blur(16px);background:var(--header-bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:12px 26px;
}
.crumb{font-size:12.5px;color:var(--text-muted);}
.crumb b{color:var(--text);}
.top-actions{margin-right:auto;display:flex;align-items:center;gap:10px;}
.icon-btn{
  width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:var(--card);border:1px solid var(--border);color:var(--text);font-size:15px;position:relative;
  transition:transform .15s,box-shadow .15s;
}
.icon-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-card);}
.dot{position:absolute;top:6px;left:7px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid var(--surface);}
.profile-chip{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 6px;border-radius:30px;background:var(--card);border:1px solid var(--border);}
.profile-chip img{width:30px;height:30px;border-radius:50%;object-fit:cover;}
.profile-chip .pname{font-size:12.5px;font-weight:700;}
.profile-chip .prole{font-size:10.5px;color:var(--text-muted);}

.content{padding:26px;max-width:1400px;width:100%;margin:0 auto;}
.page{animation:fadeUp .45s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ===== Cards / grid ===== */
.grid{display:grid;gap:18px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:680px){.g4,.g3,.g2{grid-template-columns:1fr;}}

.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:20px;box-shadow:var(--shadow-card);
}
.stat-card{position:relative;overflow:hidden;}
.stat-card .stat-ic{
  width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:var(--grad-primary);color:#fff;font-size:18px;margin-bottom:12px;
}
.stat-card .stat-num{font-size:28px;font-weight:800;}
.stat-card .stat-label{font-size:12.5px;color:var(--text-muted);margin-top:2px;}
.stat-trend{font-size:11.5px;font-weight:700;margin-top:8px;display:inline-flex;align-items:center;gap:4px;}
.stat-trend.up{color:var(--success);}

.section-title{display:flex;align-items:center;justify-content:between;margin-bottom:14px;}
.section-title h2{font-size:18px;font-weight:800;margin:0;}
.section-title .sub{font-size:12.5px;color:var(--text-muted);margin-top:2px;}

.btn{
  display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;
  font-size:13px;font-weight:700;transition:transform .15s,box-shadow .15s;
}
.btn-primary{background:var(--grad-primary);color:#fff;box-shadow:0 8px 18px -8px rgba(100,56,168,.55);}
.btn-primary:hover{transform:translateY(-2px);}
.btn-gold{background:var(--grad-gold);color:#2a1b06;}
.btn-ghost{background:var(--card);border:1px solid var(--border);}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:9px;}

.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;}
.badge-success{background:rgba(47,143,106,.13);color:var(--success);}
.badge-warning{background:rgba(201,138,44,.13);color:var(--warning);}
.badge-danger{background:rgba(184,67,63,.13);color:var(--danger);}
.badge-purple{background:var(--purple-100);color:var(--purple-700);}

.week-card{cursor:pointer;transition:transform .2s,box-shadow .2s;}
.week-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-soft);}
.week-card .wk-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.week-card .wk-num{font-size:12px;color:var(--purple-500);font-weight:800;}
.progress-bar{height:6px;background:var(--border);border-radius:6px;overflow:hidden;margin-top:12px;}
.progress-bar span{display:block;height:100%;background:var(--grad-primary);border-radius:6px;transition:width .6s ease;}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(20,16,32,.55);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--surface);border-radius:24px;max-width:780px;width:100%;max-height:86vh;overflow-y:auto;
  padding:28px;transform:scale(.94) translateY(12px);transition:transform .3s;box-shadow:0 30px 60px -15px rgba(0,0,0,.35);
}
.modal-overlay.open .modal{transform:scale(1) translateY(0);}
.modal-close{position:sticky;top:0;float:left;background:var(--card);border:1px solid var(--border);width:34px;height:34px;border-radius:10px;}

/* ===== Login ===== */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(circle at 30% 20%,var(--purple-800),var(--purple-950) 60%);}
.auth-card{background:var(--surface);border-radius:28px;padding:44px 38px;width:100%;max-width:420px;box-shadow:0 40px 80px -20px rgba(0,0,0,.5);text-align:center;}
.auth-logos{display:flex;justify-content:center;gap:14px;margin-bottom:18px;}
.auth-logos img{height:52px;animation:logoFloat 4s ease-in-out infinite;background:#fff;border-radius:10px;padding:5px;box-shadow:var(--shadow-card);}
.auth-logos img:nth-child(2){animation-delay:.5s;}
.field{text-align:right;margin-bottom:14px;}
.field label{font-size:12px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg);
  font-family:inherit;font-size:13.5px;color:var(--text);outline:none;transition:border .2s;
}
.field input:focus{border-color:var(--purple-500);}

/* AI Panel */
.ai-box{border:1px dashed var(--purple-400);background:var(--purple-100);border-radius:16px;padding:16px;}
[data-theme="dark"] .ai-box{background:rgba(127,79,201,.12);}
.ai-msg{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;font-size:13px;line-height:1.7;}
.typing-dots span{display:inline-block;width:5px;height:5px;background:var(--purple-500);border-radius:50%;margin:0 1px;animation:blink 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

.toast-wrap{position:fixed;bottom:22px;left:22px;z-index:300;display:flex;flex-direction:column;gap:10px;}
.toast{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 18px;box-shadow:var(--shadow-soft);
  font-size:13px;display:flex;align-items:center;gap:10px;animation:toastIn .3s ease;min-width:240px;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:right;color:var(--text-muted);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--border);font-size:11.5px;}
td{padding:12px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}

@media(max-width:900px){
  .sidebar{position:fixed;right:0;transform:translateX(100%);}
  .sidebar.mobile-open{transform:translateX(0);}
  .content{padding:16px;}
}
</style>
</head>

<script>
/* ================= STATE ================= */
const STORAGE_KEY='gtip_state_v1';
let state = JSON.parse(localStorage.getItem(STORAGE_KEY)||'null') || seedState();
let currentRoute='home';

function seedState(){
  const weeks=[];
  const titles=[
    'التعارف على الهيكل التنظيمي للوزارة','الأنظمة واللوائح المنظمة للحج والعمرة','الشؤون القانونية والعقود الحكومية',
    'الحوكمة والامتثال المؤسسي','آليات فحص التراخيص والتفويض','دراسة حالات تعاقدية فعلية',
    'الرقابة المالية والتدقيق الداخلي','اللوائح الضريبية والزكوية ذات الصلة','التكامل بين الأنظمة القانونية والتقنية',
    'إعداد المذكرات والمرافعات القانونية','التقييم النهائي لمشاريع التدريب','تجميع التقرير الختامي والتوصيات'
  ];
  for(let i=0;i<12;i++){
    weeks.push({
      id:i+1,title:'الأسبوع '+(i+1)+': '+titles[i],
      status: i<8?'approved': i===8?'pending':'upcoming',
      date:'2025-'+String(9+Math.floor(i/4)).padStart(2,'0')+'-'+String(1+(i%4)*7).padStart(2,'0'),
      summary:'رصد وتوثيق الأنشطة القانونية والتنظيمية خلال الأسبوع بما يشمل المراجعة والتحليل والتوصيات العملية.',
      tasks:Math.floor(Math.random()*3)+3,
      score:i<8? (85+Math.floor(Math.random()*12)):null,
      supervisorNote:i<8?'أداء متميز وتحليل قانوني دقيق للحالات المطروحة.':''
    });
  }
  return {
    user:{name:'بتول الزهراني',role:'student',email:'batool@mohu.gov.sa'},
    weeks, tasksTotal:41, tasksDone:33, trainingHours:186,
    notifications:['تمت الموافقة على تقرير الأسبوع 8','تعليق جديد من المشرف على الأسبوع 7','تذكير: رفع تقرير الأسبوع 9 غداً']
  };
}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}

/* ================= NAV CONFIG ================= */
const NAV = {
  student:[
    {sec:'عام',items:[['home','🏠','الرئيسية'],['dashboard','📊','لوحة التحكم']]},
    {sec:'التدريب',items:[['weeks','🗂️','التقارير الأسبوعية'],['tasks','✅','المهام'],['attachments','📎','المرفقات'],['gallery','🖼️','معرض الصور']]},
    {sec:'النمو المهني',items:[['ai','🤖','المساعد الذكي'],['skills','🧩','المهارات'],['achievements','🏆','الإنجازات'],['certificates','📜','الشهادات'],['cv','🗒️','السيرة الذاتية']]},
    {sec:'الحساب',items:[['profile','👤','الملف الشخصي'],['timeline','📅','السيرة الزمنية'],['qr','🔗','رمز التحقق'],['settings','⚙️','الإعدادات']]},
  ],
  supervisor:[
    {sec:'عام',items:[['home','🏠','الرئيسية'],['dashboard','📊','لوحة التحكم']]},
    {sec:'الإشراف',items:[['weeks','🗂️','مراجعة التقارير'],['tasks','✅','مهام المتدربات'],['reports','📈','تقارير الأداء']]},
    {sec:'الحساب',items:[['profile','👤','الملف الشخصي'],['settings','⚙️','الإعدادات']]},
  ],
  admin:[
    {sec:'عام',items:[['home','🏠','الرئيسية'],['admin','🛡️','لوحة الإدارة']]},
    {sec:'الإدارة',items:[['users','👥','المستخدمون'],['departments','🏛️','الإدارات'],['reports','📈','التقارير'],['analytics','📉','التحليلات']]},
    {sec:'النظام',items:[['audit','🧾','سجل التدقيق'],['settings','⚙️','إعدادات النظام']]},
  ]
};

/* ================= AUTH ================= */
function doLogin(){
  const role=document.getElementById('loginRole').value;
  state.user.role=role;
  state.user.name= role==='admin'?'إدارة النظام': role==='supervisor'?'م. سارة العمري':'بتول الزهراني';
  saveState();
  document.getElementById('view-login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('chipName').textContent=state.user.name;
  document.getElementById('chipRole').textContent= role==='admin'?'مدير النظام': role==='supervisor'?'مشرفة':'متدربة';
  buildNav();
  navigate(role==='admin'?'admin':'home');
  toast('مرحباً بك، '+state.user.name);
}

/* ================= NAV RENDER ================= */
function buildNav(){
  const groups=NAV[state.user.role]||NAV.student;
  const el=document.getElementById('navScroll');
  el.innerHTML=groups.map(g=>`
    <div class="nav-group">
      ${g.items.map(([id,ic,label])=>`
        <a class="nav-item" data-route="${id}" onclick="navigate('${id}')">
          <span class="ic">${ic}</span><span class="side-label">${label}</span>
          ${id==='weeks' && state.user.role==='student' ? `<span class="nav-badge">${state.weeks.filter(w=>w.status==='pending').length||0}</span>`:''}
        </a>`).join('')}
    </div>`).join('');
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed');}
function toggleTheme(){
  const b=document.body; const cur=b.getAttribute('data-theme');
  b.setAttribute('data-theme', cur==='dark'?'light':'dark');
}

/* ================= ROUTER ================= */
const TITLES={home:'الرئيسية',dashboard:'لوحة التحكم',weeks:'التقارير الأسبوعية',tasks:'المهام',attachments:'المرفقات',
  gallery:'معرض الصور',ai:'المساعد الذكي',skills:'المهارات',achievements:'الإنجازات',certificates:'الشهادات',cv:'السيرة الذاتية',
  profile:'الملف الشخصي',timeline:'السيرة الزمنية',qr:'رمز التحقق',settings:'الإعدادات',admin:'لوحة الإدارة',users:'المستخدمون',
  departments:'الإدارات',reports:'التقارير',analytics:'التحليلات',audit:'سجل التدقيق'};

function navigate(route){
  currentRoute=route;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.route===route));
  document.getElementById('crumbTitle').textContent=TITLES[route]||route;
  document.getElementById('content').innerHTML=render(route);
  document.getElementById('sidebar').classList.remove('mobile-open');
}

function render(route){
  switch(route){
    case 'home': return renderHome();

function statCard(ic,num,label){
  return `<div class="card stat-card"><div class="stat-ic">${ic}</div><div class="stat-num">${num}</div><div class="stat-label">${label}</div><div class="stat-trend up">▲ متوافق مع الخطة</div></div>`;
}
function weekRow(w){
  return `<div class="flex" style="justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="openWeek(${w.id})">
    <div><b style="font-size:13px;">${w.title}</b><div class="muted" style="font-size:11.5px;">${w.date}</div></div>
    ${statusBadge(w.status)}
  </div>`;
}
function statusBadge(s){
  if(s==='approved') return '<span class="badge badge-success">معتمد</span>';
  if(s==='pending') return '<span class="badge badge-warning">قيد المراجعة</span>';
  return '<span class="badge badge-purple">قادم</span>';
}

function renderDashboard(){
  return `<div class="page">
    <div class="section-title"><h2>لوحة التحكم</h2><div class="sub">نظرة عامة على تقدمك التدريبي</div></div>
    <div class="grid g4">
      ${statCard('📈','92%','معدل الإنجاز')}
      ${statCard('🧩','14','مهارة مكتسبة')}
      ${statCard('📎','27','مرفق موثّق')}
      ${statCard('🏆','5','إنجاز معتمد')}
    </div>
    <div class="card" style="margin-top:20px;">
      <div class="section-title"><h2>تقدّم الأسابيع</h2></div>
      ${state.weeks.map(w=>`<div style="margin-bottom:10px;">
        <div class="flex" style="justify-content:space-between;font-size:12.5px;margin-bottom:4px;"><span>${w.title}</span>${statusBadge(w.status)}</div>
        <div class="progress-bar"><span style="width:${w.status==='approved'?100:w.status==='pending'?60:0}%"></span></div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderWeeks(){
  return `<div class="page">
    <div class="section-title"><h2>التقارير الأسبوعية</h2><div class="sub">12 أسبوعاً تدريبياً موثقاً</div></div>
    <div class="grid g3">
      ${state.weeks.map(w=>`
        <div class="card week-card" onclick="openWeek(${w.id})">
          <div class="wk-top"><span class="wk-num">أسبوع ${w.id}</span>${statusBadge(w.status)}</div>
          <b style="font-size:13.5px;display:block;margin-bottom:6px;">${w.title.split(': ')[1]||w.title}</b>
          <p class="muted" style="font-size:12px;line-height:1.6;">${w.summary}</p>
          <div class="flex" style="justify-content:space-between;margin-top:12px;font-size:11.5px;color:var(--text-muted);">
            <span>📅 ${w.date}</span><span>✅ ${w.tasks} مهام</span>
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

function openWeek(id){
  const w=state.weeks.find(x=>x.id===id);
  document.getElementById('weekModalBody').innerHTML=`
    <button class="modal-close" onclick="closeWeekModal()">✕</button>
    <div style="clear:both;padding-top:8px;">
      <div class="flex" style="justify-content:space-between;align-items:center;">
        <h2 style="margin:0;">${w.title}</h2>${statusBadge(w.status)}
      </div>
      <p class="muted" style="font-size:12.5px;margin:6px 0 18px;">📅 ${w.date} · ${w.tasks} مهام مسجّلة ${w.score?'· تقييم '+w.score+'%':''}</p>
      <div class="grid g2">
        <div><b style="font-size:13px;">الملخص</b><p class="muted" style="font-size:13px;line-height:1.8;">${w.summary}</p></div>
        <div><b style="font-size:13px;">ملاحظات المشرف</b><p class="muted" style="font-size:13px;line-height:1.8;">${w.supervisorNote||'بانتظار المراجعة'}</p></div>
      </div>
      <div class="ai-box" style="margin-top:16px;">
        <b style="font-size:12.5px;">🤖 تحليل الذكاء الاصطناعي</b>
        <p style="font-size:12.5px;margin-top:6px;">تحليل النص القانوني في هذا الأسبوع يعكس تطبيقاً دقيقاً للأنظمة ذات الصلة، مع فرصة لتوسيع الجانب المقارن بين اللوائح المحلية والدولية.</p>
      </div>
      <div class="flex" style="gap:10px;margin-top:18px;">

async function runAI(mode){
  const input=document.getElementById('aiInput').value.trim();
  const out=document.getElementById('aiOutput');
  if(!input){toast('أدخلي نصاً أولاً');return;}
  out.innerHTML=`<div class="ai-msg"><span class="typing-dots"><span></span><span></span><span></span></span> جاري التحليل...</div>`;
  const prompts={
    rewrite:'أعد صياغة النص التالي بأسلوب حكومي رسمي قانوني فصيح، بدون مقدمات: \n\n'+input,
    skills:'استخرج من النص التالي 4-6 مهارات مهنية بصيغة نقاط قصيرة فقط: \n\n'+input,
    score:'قيّم أداء هذا الأسبوع من 100 مع سطرين تعليق مختصر بصيغة رسمية: \n\n'+input,
    linkedin:'حوّل النص التالي إلى منشور LinkedIn قصير واحترافي بالعربية مع هاشتاقات مناسبة: \n\n'+input
  };
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,messages:[{role:'user',content:prompts[mode]}]})});
    const data=await res.json();
    const text=(data.content||[]).map(c=>c.text||'').join('\n').trim()||'تعذر توليد نتيجة.';
    out.innerHTML=`<div class="ai-msg" style="white-space:pre-wrap;">${escapeHtml(text)}</div>`;
  }catch(e){
    out.innerHTML=`<div class="ai-msg">تعذر الاتصال بخدمة الذكاء الاصطناعي حالياً. سيتم ربطها بمفتاح OpenAI عند التفعيل النهائي.</div>`;
  }
}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function renderQR(){
  return `<div class="page"><div class="card" style="text-align:center;max-width:380px;margin:0 auto;">
    <b style="font-size:14px;">رمز التحقق من الملف التدريبي</b>
    <div id="qrCanvasWrap" style="margin:18px auto;width:180px;height:180px;background:repeating-linear-gradient(45deg,#1c1a22 0 6px,#fff 6px 12px);border-radius:12px;"></div>
    <p class="muted" style="font-size:12px;">يفتح هذا الرمز الملف العام للمتدربة عند التفعيل النهائي مع مكتبة QRCode.js</p>
  </div></div>`;
}

function renderSettings(){
  return `<div class="page"><div class="card" style="max-width:520px;">
    <div class="section-title"><h2>الإعدادات</h2></div>

function renderGeneric(route){
  return `<div class="page"><div class="card" style="text-align:center;padding:60px 20px;">
    <div style="font-size:34px;margin-bottom:10px;">🚧</div>
    <b>صفحة "${TITLES[route]||route}"</b>
    <p class="muted" style="font-size:13px;margin-top:6px;">هذا القسم جاهز للبناء الكامل في المرحلة التالية من التطوير مع نفس نظام التصميم.</p>
  </div></div>`;
}

function logout(){
  document.getElementById('app').classList.add('hidden');
  document.getElementById('view-login').classList.remove('hidden');
}

/* ================= MISC ================= */
function toast(msg){
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');t.className='toast';t.innerHTML='🔔 '+msg;
  wrap.appendChild(t);setTimeout(()=>t.remove(),3200);
